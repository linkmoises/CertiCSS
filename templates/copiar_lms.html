{% include 'tablero-header.html' %}

{% include 'tablero-sidebar.html' %}
    
    <!-- CONTENIDO -->
    <div class="w-full lg:ps-64">
        <div class="p-4 sm:p-6 space-y-4 sm:space-y-6">

            <div class="max-w-[85rem] px-2 pt-1 mx-auto">
                <div class="flex flex-col">
                <div class="-m-1.5 overflow-x-auto">
                    <div class="p-1.5 min-w-full inline-block align-middle">
                    <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">

                        <div class="px-6 py-4 grid gap-3 md:flex md:justify-between md:items-center border-b border-gray-200">
                            <div>
                                <h2 class="text-xl font-semibold text-gray-800">
                                    Copiar LMS
                                </h2>
                                <p class="text-sm text-gray-600">
                                    Copiar contenidos LMS de <strong>{{ evento.codigo }}</strong> a otro evento
                                </p>
                            </div>
                        </div>

                        <div class="p-6">
                            <form method="POST">
                                <div class="max-w-lg mx-auto">
                                    <div class="mb-6">
                                        <label for="codigo_destino" class="block text-sm font-medium text-gray-800 mb-2">
                                            Código del evento destino
                                        </label>
                                        <input type="text" id="codigo_destino" name="codigo_destino" 
                                            class="py-2 px-3 pe-11 block w-full border-gray-200 shadow-sm text-sm rounded-lg focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600"
                                            placeholder="Ingrese el código del evento (ej: ABC123)" required>
                                        <p class="mt-2 text-sm text-gray-500">
                                            Ingrese el código del evento al que desea copiar los contenidos LMS.
                                        </p>
                                    </div>

                                    <div class="flex gap-x-2">
                                        <button type="submit" class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700 focus:outline-none focus:bg-blue-700">
                                            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                            Copiar contenidos LMS
                                        </button>
                                        <a href="{{ url_for('ver_evento', codigo_evento=evento.codigo) }}" class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 focus:outline-none focus:bg-gray-50">
                                            Cancelar
                                        </a>
                                    </div>
                                </div>
                            </form>
                        </div>

                    </div>
                    </div>
                </div>
                </div>
            </div>

{% include 'tablero-footer.html' %}

<script src="{{ url_for('static', filename='node_modules/preline/dist/preline.js') }}"></script>
</body>
</html>
